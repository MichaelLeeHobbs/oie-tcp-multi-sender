# Local/CI test stack: OIE (with the plugin) + the controllable MLLP sink standing in for two HA replicas.
#   docker compose -f docker/oie-test.compose.yaml up -d --build
# Then run the failover driver (see docs/TESTING.md). The sink exposes:
#   - MLLP on 6661 (endpoint A) and 6662 (endpoint B)
#   - an HTTP control API on 9000 (GET /state, POST /control {port,mode,up}, POST /reset)
name: oie-tcpmulti-test

services:
  oie:
    # Pinned by digest (= openintegrationengine/engine:4.5.2-alpine). A tag is a mutable pointer, so a
    # tag-pinned stack can silently change engines between runs and turn a behavior test into a coin flip.
    image: openintegrationengine/engine@sha256:1981539a81253861a965aeadd3bbf37ae3980088e7351abb6cf7d3f9971dfb78
    ports:
      - "8443:8443"
    volumes:
      - ../package/target:/opt/engine/custom-extensions:ro   # auto-installs the built plugin on boot
    depends_on: [ sink ]

  sink:
    build: ../test-harness
    environment:
      DATA_PORTS: "6661,6662"
      CONTROL_PORT: "9000"
    ports:
      - "19000:9000"   # control API on host:19000 (9000 avoided — commonly used by MinIO etc.)
